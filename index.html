<!DOCTYPE html>
<html>
<head>
  <title>Game Hub</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
      color: #00ffff;
    }

    /* HUB BUTTON */
    #openGridBtn {
      margin: 20px;
      padding: 12px 18px;
      background: #00ffff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    #openGridBtn:hover {
      box-shadow: 0 0 12px #00ffff;
    }

    /* OVERLAY */
    #gridContainer {
      position: fixed;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: rgba(0,0,0,0.9);
      display: none;
      justify-content: center;
      align-items: center;
      flex-direction: column;
    }

    /* GRID */
    #grid {
      display: grid;
      grid-template-columns: repeat(16, 25px);
      grid-template-rows: repeat(16, 25px);
      gap: 2px;
      margin-bottom: 20px;
    }

    .cell {
      width: 25px;
      height: 25px;
      background: #111;
      border: 1px solid #00ffff33;
      cursor: pointer;
      transition: 0.15s;
    }

    .cell:hover {
      box-shadow: 0 0 6px #00ffff;
    }

    /* CLOSE BUTTON */
    #closeBtn {
      padding: 10px 15px;
      background: #ff0055;
      border: none;
      color: white;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    #closeBtn:hover {
      box-shadow: 0 0 10px #ff0055;
    }
  </style>
</head>

<body>

<!-- HUB BUTTON (UPDATED TEXT) -->
<button id="openGridBtn">Buttons</button>

<!-- GRID OVERLAY -->
<div id="gridContainer">

  <div id="grid"></div>

  <button id="closeBtn">Close</button>

</div>

<script>
const gridContainer = document.getElementById("gridContainer");
const grid = document.getElementById("grid");

const openBtn = document.getElementById("openGridBtn");
const closeBtn = document.getElementById("closeBtn");

/* 🌈 COLORS */
const colors = [
  "#ff0000",
  "#ff7f00",
  "#ffff00",
  "#00ff00",
  "#00ffff",
  "#8a2be2"
];

/* OPEN / CLOSE */
openBtn.onclick = () => {
  gridContainer.style.display = "flex";
};

closeBtn.onclick = () => {
  gridContainer.style.display = "none";
};

/* BUILD GRID */
for(let i = 0; i < 256; i++){
  const cell = document.createElement("div");
  cell.classList.add("cell");

  let state = 0;

  cell.addEventListener("click", () => {
    state = (state + 1) % (colors.length + 1);

    if(state === 0){
      cell.style.background = "#111";
      cell.style.boxShadow = "none";
    } else {
      const c = colors[state - 1];
      cell.style.background = c;
      cell.style.boxShadow = `0 0 10px ${c}`;
    }
  });

  grid.appendChild(cell);
}
</script>

</body>
</html>
