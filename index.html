      display: flex;

      align-items: center;
      height: 100vh;

    .menu {

    }

    h1 {

      display: block;

      margin: 10px auto;
      padding: 12px;

      background: #00ffff;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
      transition: 0.2s;

    button:hover {

      transform: scale(1.02);
