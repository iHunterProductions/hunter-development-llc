<!DOCTYPE html>
<html>
<head>
  <title>Hunter Arcade</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border-radius: 6px;
      border: none;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00c8c8;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      transition: 0.2s;
      font-weight: bold;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px #003366;
    }

    #hub { display:none; }

    /* ADMIN PANEL */
    #adminPanel {
      display:none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }

    #userList div {
      padding: 6px;
      border: 1px solid #00ffff;
      margin: 4px 0;
      cursor: pointer;
    }

    #actionBox {
      display:none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }

    /* AP BUTTON */
    #adminBtn {
      position: fixed;
      bottom: 15px;
      left: 15px;
      width: 55px;
      height: 55px;
      border-radius: 50%;
      border: none;
      background: #00c8c8;
      font-weight: bold;
      cursor: pointer;
      display: none;
      box-shadow: 0 0 10px #00ffff;
      z-index: 9999;
    }

    #adminBtn:hover {
      transform: scale(1.15);
      box-shadow: 0 0 25px #003366;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Hunter Arcade</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
</div>

<!-- HUB -->
<div id="hub" class="box">
  <h2 id="welcome"></h2>

  <button onclick="alert('Terms of Use')">Terms of Use</button>
  <button onclick="location.href='chat.html'">Chat.Me 2</button>
  <button onclick="location.href='games/tetris/'">Tetris</button>
  <button onclick="location.href='games/scramble/'">Scramble</button>

  <div id="adminPanel">
    <h4>Users</h4>
    <div id="userList"></div>

    <div id="actionBox">
      <h4 id="selectedUserText"></h4>

      <button onclick="banUser()">Ban</button>
      <button onclick="unbanUser()">Unban</button>
      <button onclick="muteUser()">Mute</button>
      <button onclick="unmuteUser()">Unmute</button>
      <button onclick="sendAnnouncement()">📢 Global Message</button>

      <button onclick="closeAction()">Close</button>
    </div>
  </div>
</div>

<!-- AP BUTTON -->
<button id="adminBtn" onclick="toggleAdmin()">AP</button>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
const ADMIN = "iHunterDoesProductions";
const ABLY_KEY = "c-wtfg.-Nr1zw:P37xNKXR2B4E-KOPhClqoUsFYS51FUiFroqUPVr3DZM"; // 🔑 PUT YOUR KEY HERE

let selectedUser = null;

function isAdmin(){
  return localStorage.getItem("currentUser") === ADMIN;
}

/* LOGIN */
function signUp(){
  const u = username.value.trim();
  const p = password.value;

  if(!u || !p) return alert("Fill all");

  localStorage.setItem("user_"+u, p);

  let users = JSON.parse(localStorage.getItem("users")||"[]");
  if(!users.includes(u)){
    users.push(u);
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", u);
  loadHub(u);
}

function signIn(){
  const u = username.value.trim();
  const p = password.value;

  if(localStorage.getItem("banned_"+u)==="true"){
    return alert("Banned");
  }

  if(localStorage.getItem("user_"+u)!==p){
    return alert("Wrong login");
  }

  localStorage.setItem("currentUser", u);
  loadHub(u);
}

function loadHub(u){
  login.style.display="none";
  hub.style.display="block";

  welcome.innerText="Welcome, "+u;

  if(isAdmin()){
    adminBtn.style.display="block";
  }
}

/* ADMIN PANEL */
function toggleAdmin(){
  if(!isAdmin()) return alert("Denied");

  adminPanel.style.display =
    adminPanel.style.display==="block" ? "none":"block";

  if(adminPanel.style.display==="block"){
    loadUsers();
  }
}

function loadUsers(){
  let users = JSON.parse(localStorage.getItem("users")||"[]");
  userList.innerHTML="";

  users.forEach(u=>{
    let div=document.createElement("div");
    div.innerText=u;
    div.onclick=()=>selectUser(u);
    userList.appendChild(div);
  });
}

function selectUser(u){
  selectedUser=u;
  selectedUserText.innerText="Selected: "+u;
  actionBox.style.display="block";
}

function closeAction(){
  selectedUser=null;
  actionBox.style.display="none";
}

/* MODERATION */
function banUser(){
  if(!isAdmin()||!selectedUser) return;
  localStorage.setItem("banned_"+selectedUser,"true");
}

function unbanUser(){
  if(!isAdmin()||!selectedUser) return;
  localStorage.removeItem("banned_"+selectedUser);
}

function muteUser(){
  if(!isAdmin()||!selectedUser) return;
  localStorage.setItem("muted_"+selectedUser,"true");
}

function unmuteUser(){
  if(!isAdmin()||!selectedUser) return;
  localStorage.removeItem("muted_"+selectedUser);
}

/* GLOBAL ANNOUNCEMENT */
function sendAnnouncement(){
  if(!isAdmin()) return;

  const msg = prompt("Message:");
  if(!msg) return;

  const ably = new Ably.Realtime({ key: ABLY_KEY });
  const channel = ably.channels.get("chat-me-2");

  channel.publish("announcement", { text: msg });
}

/* INIT */
window.onload=()=>{
  const u=localStorage.getItem("currentUser");
  if(u) loadHub(u);
};
</script>

</body>
</html>
