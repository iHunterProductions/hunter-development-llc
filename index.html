<!DOCTYPE html>
<html>
<head>
  <title>Hunter Development LLC</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #05070a, #000);
      color: #00ffff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .menu {
      text-align: center;
      border: 2px solid #00ffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px rgba(0,255,255,0.6);
      width: 340px;
      background: rgba(0,0,0,0.6);
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
      letter-spacing: 1px;
    }

    /* BASE BUTTON (CYAN) */
    button {
      display: block;
      width: 260px;
      margin: 12px auto;
      padding: 14px;

      border: none;
      border-radius: 10px;
      cursor: pointer;

      background: #00c8c8;
      color: #001010;
      font-weight: bold;

      transition: all 0.25s ease;

      box-shadow: 0 0 6px rgba(0, 200, 200, 0.5);
    }

    /* HOVER = DARK BLUE GLOW */
    button:hover {
      transform: translateY(-4px) scale(1.05);

      box-shadow:
        0 0 8px #001a33,
        0 0 16px #00264d,
        0 0 28px #003366,
        0 0 45px #004080;
    }

    /* CLICK EFFECT */
    button:active {
      transform: scale(0.97);
      box-shadow: 0 0 10px #001a33 inset;
    }

    /* TERMS SPECIAL (optional accent) */
    .terms {
      background: #00c8c8;
    }
  </style>
</head>

<body>

<div class="menu">
  <h1>Hunter Development LLC</h1>

  <button class="terms" onclick="alert('Rules and Terms of Use: To be determined')">
    Terms of Use
  </button>

  <button onclick="location.href='chat.html'">
    Chat.Me 2
  </button>

  <button onclick="location.href='games/scramble/'">
    Scrambled Word Game
  </button>

  <button onclick="location.href='games/tetris/'">
    Tetris
  </button>
</div>

</body>
</html>
