<!DOCTYPE html>
<html>
<head>
  <title>iHunter Game Hub</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
      color: #00ffff;
    }

    .hub {
      margin: 30px;
    }

    /* MAIN BUTTON STYLE */
    .mainBtn {
      width: 180px;
      padding: 10px;
      background: #00ffff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      margin-bottom: 5px;
      display: block;
    }

    .mainBtn:hover {
      box-shadow: 0 0 12px #00ffff;
    }

    /* DROPDOWN CONTAINER */
    .dropdown {
      display: none;
      margin-left: 20px;
      margin-bottom: 10px;
    }

    .dropdown button {
      width: 160px;
      padding: 8px;
      margin-top: 5px;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 5px;
      color: black;
    }

    /* DIFFICULTY COLORS */
    .hard { background: #ff0033; }
    .normal { background: #ffcc00; }
    .easy { background: #00ff66; }

    /* SIMPLE BUTTONS */
    .simpleBtn {
      width: 180px;
      padding: 10px;
      background: #00ffff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 10px;
      display: block;
    }

    .simpleBtn:hover {
      box-shadow: 0 0 12px #00ffff;
    }
  </style>
</head>

<body>

<div class="hub">

  <!-- TETRIS DROPDOWN -->
  <button class="mainBtn" onclick="toggle('tetrisMenu')">
    Tetris ▼
  </button>

  <div id="tetrisMenu" class="dropdown">
    <button class="hard" onclick="location.href='games/tetris/hard.html'">Hard</button>
    <button class="normal" onclick="location.href='games/tetris/normal.html'">Normal</button>
    <button class="easy" onclick="location.href='games/tetris/easy.html'">Easy</button>
  </div>

  <!-- SCRAMBLE -->
  <button class="simpleBtn" onclick="location.href='games/scramble/index.html'">
    Scramble
  </button>

  <!-- BUTTONS (GRID TOOL) -->
  <button class="simpleBtn" onclick="openGrid()">
    Buttons
  </button>

</div>

<!-- GRID OVERLAY -->
<div id="gridContainer" style="
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.9);
  display:none;
  justify-content:center;
  align-items:center;
  flex-direction:column;
">

  <div id="grid" style="
    display:grid;
    grid-template-columns:repeat(16,25px);
    grid-template-rows:repeat(16,25px);
    gap:2px;
    margin-bottom:20px;
  "></div>

  <button onclick="closeGrid()" style="
    padding:10px 15px;
    background:#ff0055;
    border:none;
    color:white;
    font-weight:bold;
    border-radius:6px;
    cursor:pointer;
  ">Close</button>

</div>

<script>
/* DROPDOWN TOGGLE */
function toggle(id){
  const el = document.getElementById(id);
  el.style.display = el.style.display === "block" ? "none" : "block";
}

/* GRID OPEN/CLOSE */
function openGrid(){
  document.getElementById("gridContainer").style.display = "flex";
}
function closeGrid(){
  document.getElementById("gridContainer").style.display = "none";
}

/* GRID BUILD */
const grid = document.getElementById("grid");

const colors = [
  "#ff0000",
  "#ff7f00",
  "#ffff00",
  "#00ff00",
  "#00ffff",
  "#8a2be2"
];

for(let i=0;i<256;i++){
  const cell = document.createElement("div");
  cell.style.width = "25px";
  cell.style.height = "25px";
  cell.style.background = "#111";
  cell.style.border = "1px solid #00ffff33";
  cell.style.cursor = "pointer";

  let state = 0;

  cell.onclick = () => {
    state = (state + 1) % (colors.length + 1);

    if(state === 0){
      cell.style.background = "#111";
      cell.style.boxShadow = "none";
    } else {
      const c = colors[state - 1];
      cell.style.background = c;
      cell.style.boxShadow = `0 0 10px ${c}`;
    }
  };

  grid.appendChild(cell);
}
</script>

</body>
</html>
