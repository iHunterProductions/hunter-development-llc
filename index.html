<!DOCTYPE html>
<html>
<head>
  <title>Hunter Arcade</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00c8c8;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px #003366;
    }

    #hub { display: none; }

    /* ADMIN UI */
    #adminPanel {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }

    #userList div {
      padding: 6px;
      margin: 4px 0;
      border: 1px solid #00ffff;
      cursor: pointer;
      transition: 0.2s;
    }

    #userList div:hover {
      background: rgba(0,255,255,0.1);
      transform: scale(1.02);
    }

    #actionBox {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Hunter Arcade</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
</div>

<!-- HUB -->
<div id="hub" class="box">
  <h2 id="welcome"></h2>

  <button onclick="alert('Terms of Use')">Terms of Use</button>
  <button onclick="location.href='chat.html'">Chat.Me 2</button>
  <button onclick="location.href='games/tetris/'">Tetris</button>
  <button onclick="location.href='games/scramble/'">Scramble</button>

  <button id="adminBtn" onclick="toggleAdmin()" style="display:none;">
    Admin Panel
  </button>

  <!-- ADMIN PANEL -->
  <div id="adminPanel">
    <h4>Users</h4>
    <div id="userList"></div>

    <div id="actionBox">
      <h4 id="selectedUserText">No user selected</h4>

      <button onclick="banUser()">Ban</button>
      <button onclick="unbanUser()">Unban</button>
      <button onclick="muteUser()">Mute</button>
      <button onclick="unmuteUser()">Unmute</button>

      <button onclick="closeAction()">Close</button>
    </div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN = "iHunterDoesProductions";

let selectedUser = null;

/* ADMIN CHECK */
function isAdmin(){
  return localStorage.getItem("currentUser") === ADMIN;
}

/* SIGN UP */
function signUp(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(!user || !pass) return alert("Fill both fields");

  if(localStorage.getItem("user_" + user)){
    return alert("Account exists");
  }

  localStorage.setItem("user_" + user, pass);

  let users = JSON.parse(localStorage.getItem("users") || "[]");
  if(!users.includes(user)){
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

/* SIGN IN */
function signIn(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(localStorage.getItem("banned_" + user) === "true"){
    return alert("You are banned.");
  }

  const saved = localStorage.getItem("user_" + user);

  if(!saved || saved !== pass){
    return alert("Wrong login");
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

/* HUB */
function loadHub(user){
  document.getElementById("login").style.display = "none";
  document.getElementById("hub").style.display = "block";

  document.getElementById("welcome").innerText = `Welcome, ${user}!`;

  if(isAdmin()){
    document.getElementById("adminBtn").style.display = "block";
  }
}

/* ADMIN TOGGLE */
function toggleAdmin(){
  if(!isAdmin()){
    alert("Access denied");
    return;
  }

  const panel = document.getElementById("adminPanel");

  panel.style.display =
    panel.style.display === "block" ? "none" : "block";

  if(panel.style.display === "block"){
    loadUsers();
  }
}

/* LOAD USERS */
function loadUsers(){
  let users = JSON.parse(localStorage.getItem("users") || "[]");

  const list = document.getElementById("userList");
  list.innerHTML = "";

  users.forEach(u => {
    const div = document.createElement("div");
    div.innerText = u;

    div.onclick = () => selectUser(u);

    list.appendChild(div);
  });
}

/* SELECT USER */
function selectUser(user){
  selectedUser = user;
  document.getElementById("selectedUserText").innerText =
    "Selected: " + user;
  document.getElementById("actionBox").style.display = "block";
}

/* CLOSE ACTION BOX */
function closeAction(){
  selectedUser = null;
  document.getElementById("actionBox").style.display = "none";
}

/* ACTIONS */
function banUser(){
  if(!isAdmin() || !selectedUser) return;
  localStorage.setItem("banned_" + selectedUser, "true");
  alert(selectedUser + " banned");
}

function unbanUser(){
  if(!isAdmin() || !selectedUser) return;
  localStorage.removeItem("banned_" + selectedUser);
  alert(selectedUser + " unbanned");
}

function muteUser(){
  if(!isAdmin() || !selectedUser) return;
  localStorage.setItem("muted_" + selectedUser, "true");
  alert(selectedUser + " muted");
}

function unmuteUser(){
  if(!isAdmin() || !selectedUser) return;
  localStorage.removeItem("muted_" + selectedUser);
  alert(selectedUser + " unmuted");
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

/* AUTO LOGIN */
window.onload = () => {
  const saved = localStorage.getItem("currentUser");
  if(saved) loadHub(saved);
};
</script>

</body>
</html>
