<!DOCTYPE html>
<html>
<head>
  <title>Hunter Development LLC</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ffff;
      font-family: Arial;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    /* 🔥 FIXED TOP HEADER */
    .header {
      position: sticky;
      top: 0;
      width: 100%;
      background: #000;
      border-bottom: 2px solid #00ffff;
      text-align: center;
      padding: 15px;
      font-size: 20px;
      font-weight: bold;
      box-shadow: 0 0 10px #00ffff;
      z-index: 999;
    }

    .menu {
      margin-top: 40px;
      text-align: center;
      border: 2px solid #00ffff;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ffff;
    }

    button {
      display: block;
      width: 220px;
      margin: 10px auto;
      padding: 12px;
      border: none;
      background: #00ffff;
      color: black;
      font-weight: bold;
      border-radius: 8px;
      cursor: pointer;
    }
  </style>
</head>

<body>

<!-- 🔥 ALWAYS ON TOP -->
<div class="header">
  Terms of Use
</div>

<div class="menu">
  <h1>Hunter Development LLC</h1>

  <button onclick="openChat()">Chat.Me 2</button>
</div>

<script>
function openChat(){
  window.location.href = "chat.html";
}
</script>

</body>
</html>
