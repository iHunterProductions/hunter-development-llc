<!DOCTYPE html>
<html>
<head>
  <title>Hunter Arcade</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00c8c8;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      box-shadow: 0 0 20px #003366;
      transform: scale(1.03);
    }

    #hub { display: none; }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Hunter Arcade</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
</div>

<!-- HUB -->
<div id="hub" class="box">
  <h2 id="welcome"></h2>

  <button onclick="alert('Rules and Terms of Use: To be determined')">
    Terms of Use
  </button>

  <button onclick="location.href='chat.html'">Chat.Me 2</button>
  <button onclick="location.href='games/tetris/'">Tetris</button>
  <button onclick="location.href='games/scramble/'">Scramble</button>

  <button id="adminBtn" style="display:none;" onclick="openAdmin()">
    Users (Admin Panel)
  </button>

  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN = "iHunterDoesProductions";

/* SIGN UP */
function signUp(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(!user || !pass){
    alert("Enter username + password");
    return;
  }

  if(localStorage.getItem("user_" + user)){
    alert("Account already exists");
    return;
  }

  localStorage.setItem("user_" + user, pass);

  let users = JSON.parse(localStorage.getItem("users") || "[]");
  if(!users.includes(user)){
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", user);

  loadHub(user);
}

/* SIGN IN */
function signIn(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(localStorage.getItem("banned_" + user) === "true"){
    alert("You are banned from this arcade.");
    return;
  }

  const saved = localStorage.getItem("user_" + user);

  if(!saved){
    alert("Account not found");
    return;
  }

  if(saved !== pass){
    alert("Wrong password");
    return;
  }

  localStorage.setItem("currentUser", user);

  loadHub(user);
}

/* LOAD HUB */
function loadHub(user){
  document.getElementById("login").style.display = "none";
  document.getElementById("hub").style.display = "block";

  document.getElementById("welcome").innerText =
    `Welcome, ${user}!`;

  if(user === ADMIN){
    document.getElementById("adminBtn").style.display = "block";
  }
}

/* AUTO LOGIN */
window.onload = () => {
  const saved = localStorage.getItem("currentUser");
  if(saved) loadHub(saved);
};

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

/* ADMIN PANEL */
function openAdmin(){
  let users = JSON.parse(localStorage.getItem("users") || "[]");

  let list = users.join("\n");

  let action = prompt(
    "USERS:\n\n" + list +
    "\n\nCommands:\nban:username\nmute:username\nunban:username\nunmute:username"
  );

  if(!action) return;

  let [cmd, target] = action.split(":");

  if(cmd === "ban"){
    localStorage.setItem("banned_" + target, "true");
    alert(target + " banned");
  }

  if(cmd === "unban"){
    localStorage.removeItem("banned_" + target);
    alert(target + " unbanned");
  }

  if(cmd === "mute"){
    localStorage.setItem("muted_" + target, "true");
    alert(target + " muted");
  }

  if(cmd === "unmute"){
    localStorage.removeItem("muted_" + target);
    alert(target + " unmuted");
  }
}
</script>

</body>
</html>
