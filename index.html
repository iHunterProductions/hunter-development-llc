<!DOCTYPE html>
<html>
<head>
  <title>Hunter Arcade</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00c8c8;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: 0.25s;
    }

    button:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px #003366;
    }

    #hub { display: none; }

    #adminPanel {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }

    #userList div {
      padding: 6px;
      margin: 4px 0;
      border: 1px solid #00ffff;
      cursor: pointer;
    }

    #userList div:hover {
      background: rgba(0,255,255,0.1);
    }

    #actionBox {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }
  </style>
</head>

<body>

<div id="login" class="box">
  <h2>Hunter Arcade</h2>
  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">
  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
</div>

<div id="hub" class="box">
  <h2 id="welcome"></h2>

  <button onclick="alert('Terms of Use')">Terms of Use</button>
  <button onclick="location.href='chat.html'">Chat.Me 2</button>
  <button onclick="location.href='games/tetris/'">Tetris</button>
  <button onclick="location.href='games/scramble/'">Scramble</button>

  <button id="adminBtn" onclick="toggleAdmin()" style="display:none;">
    Admin Panel
  </button>

  <div id="adminPanel">
    <h4>Users</h4>
    <div id="userList"></div>

    <div id="actionBox">
      <h4 id="selectedUserText">No user selected</h4>

      <button onclick="banUser()">Ban</button>
      <button onclick="unbanUser()">Unban</button>
      <button onclick="muteUser()">Mute</button>
      <button onclick="unmuteUser()">Unmute</button>
      <button onclick="sendAnnouncement()">📢 Global Message</button>

      <button onclick="closeAction()">Close</button>
    </div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
const ADMIN = "iHunterDoesProductions";
const ABLY_KEY = "c-wtfg.-Nr1zw:P37xNKXR2B4E-KOPhClqoUsFYS51FUiFroqUPVr3DZM";

let selectedUser = null;

function isAdmin(){
  return localStorage.getItem("currentUser") === ADMIN;
}

/* LOGIN SYSTEM */
function signUp(){
  const user = username.value.trim();
  const pass = password.value;

  if(!user || !pass) return alert("Fill both");

  if(localStorage.getItem("user_"+user)){
    return alert("Exists");
  }

  localStorage.setItem("user_"+user, pass);

  let users = JSON.parse(localStorage.getItem("users") || "[]");
  if(!users.includes(user)){
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

function signIn(){
  const user = username.value.trim();
  const pass = password.value;

  if(localStorage.getItem("banned_"+user) === "true"){
    return alert("You are banned");
  }

  if(localStorage.getItem("user_"+user) !== pass){
    return alert("Wrong login");
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

function loadHub(user){
  login.style.display = "none";
  hub.style.display = "block";

  welcome.innerText = "Welcome, " + user;

  if(isAdmin()){
    adminBtn.style.display = "block";
  }
}

/* ADMIN */
function toggleAdmin(){
  if(!isAdmin()) return alert("Denied");

  adminPanel.style.display =
    adminPanel.style.display === "block" ? "none" : "block";

  if(adminPanel.style.display === "block") loadUsers();
}

function loadUsers(){
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  userList.innerHTML = "";

  users.forEach(u => {
    let div = document.createElement("div");
    div.innerText = u;
    div.onclick = () => selectUser(u);
    userList.appendChild(div);
  });
}

function selectUser(u){
  selectedUser = u;
  selectedUserText.innerText = "Selected: " + u;
  actionBox.style.display = "block";
}

function closeAction(){
  selectedUser = null;
  actionBox.style.display = "none";
}

/* MODERATION */
function banUser(){
  if(!selectedUser || !isAdmin()) return;
  localStorage.setItem("banned_"+selectedUser,"true");
  alert(selectedUser+" banned");
}

function unbanUser(){
  if(!selectedUser || !isAdmin()) return;
  localStorage.removeItem("banned_"+selectedUser);
  alert(selectedUser+" unbanned");
}

function muteUser(){
  if(!selectedUser || !isAdmin()) return;
  localStorage.setItem("muted_"+selectedUser,"true");
  alert(selectedUser+" muted");
}

function unmuteUser(){
  if(!selectedUser || !isAdmin()) return;
  localStorage.removeItem("muted_"+selectedUser);
  alert(selectedUser+" unmuted");
}

/* ANNOUNCEMENT */
function sendAnnouncement(){
  if(!isAdmin()) return;

  let msg = prompt("Message:");
  if(!msg) return;

  const ably = new Ably.Realtime({ key: ABLY_KEY });
  const channel = ably.channels.get("chat-me-2");

  channel.publish("announcement", { text: msg });
}

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}

window.onload = () => {
  const u = localStorage.getItem("currentUser");
  if(u) loadHub(u);
};
</script>

</body>
</html>
