<!DOCTYPE html>
<html>
<head>
  <title>Hunter Arcade</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 6px 0;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    /* 🎮 BASE BUTTON */
    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00c8c8;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      transition: all 0.25s ease;
    }

    /* 🔥 HOVER EFFECT (CYAN → DARK BLUE GLOW) */
    button:hover {
      transform: translateY(-3px) scale(1.03);
      box-shadow:
        0 0 10px #001a33,
        0 0 20px #00264d,
        0 0 35px #003366,
        0 0 50px #004080;
    }

    #hub { display: none; }

    /* 👑 ADMIN PANEL LAYOUT */
    #adminPanel {
      display: none;
      margin-top: 10px;
      border-top: 1px solid #00ffff;
      padding-top: 10px;
    }

    .adminList {
      max-height: 120px;
      overflow-y: auto;
      border: 1px solid #00ffff;
      margin: 10px 0;
      padding: 5px;
      text-align: left;
      font-size: 12px;
    }

    .adminRow {
      display: flex;
      justify-content: space-between;
      margin: 4px 0;
    }

    .miniBtn {
      width: auto;
      padding: 5px 8px;
      font-size: 11px;
      margin-left: 5px;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Hunter Arcade</h2>

  <input id="username" placeholder="Username">
  <input id="password" type="password" placeholder="Password">

  <button onclick="signUp()">Sign Up</button>
  <button onclick="signIn()">Sign In</button>
</div>

<!-- HUB -->
<div id="hub" class="box">
  <h2 id="welcome"></h2>

  <button onclick="alert('Terms of Use: To be determined')">
    Terms of Use
  </button>

  <button onclick="location.href='chat.html'">Chat.Me 2</button>
  <button onclick="location.href='games/tetris/'">Tetris</button>
  <button onclick="location.href='games/scramble/'">Scramble</button>

  <button id="adminBtn" onclick="toggleAdmin()">
    Admin Panel
  </button>

  <!-- 👑 ADMIN PANEL -->
  <div id="adminPanel">
    <h4>Users</h4>
    <div id="userList" class="adminList"></div>
  </div>

  <button onclick="logout()">Logout</button>
</div>

<script>
const ADMIN = "iHunterDoesProductions";

/* SIGN UP */
function signUp(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(!user || !pass) return alert("Enter username + password");

  if(localStorage.getItem("user_" + user)){
    return alert("Account already exists");
  }

  localStorage.setItem("user_" + user, pass);

  let users = JSON.parse(localStorage.getItem("users") || "[]");
  if(!users.includes(user)){
    users.push(user);
    localStorage.setItem("users", JSON.stringify(users));
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

/* SIGN IN */
function signIn(){
  const user = document.getElementById("username").value.trim();
  const pass = document.getElementById("password").value;

  if(localStorage.getItem("banned_" + user) === "true"){
    return alert("You are banned.");
  }

  const saved = localStorage.getItem("user_" + user);

  if(!saved || saved !== pass){
    return alert("Invalid login");
  }

  localStorage.setItem("currentUser", user);
  loadHub(user);
}

/* HUB */
function loadHub(user){
  document.getElementById("login").style.display = "none";
  document.getElementById("hub").style.display = "block";

  document.getElementById("welcome").innerText = `Welcome, ${user}!`;

  if(user === ADMIN){
    document.getElementById("adminBtn").style.display = "block";
  }
}

/* ADMIN TOGGLE */
function toggleAdmin(){
  const panel = document.getElementById("adminPanel");

  if(panel.style.display === "block"){
    panel.style.display = "none";
  } else {
    panel.style.display = "block";
    loadUsers();
  }
}

/* LOAD USERS (CLEAN LIST UI) */
function loadUsers(){
  let users = JSON.parse(localStorage.getItem("users") || "[]");
  const list = document.getElementById("userList");

  list.innerHTML = "";

  users.forEach(u => {
    const row = document.createElement("div");
    row.className = "adminRow";

    row.innerHTML = `
      <span>${u}</span>
      <span>
        <button class="miniBtn" onclick="banUser('${u}')">Ban</button>
        <button class="miniBtn" onclick="muteUser('${u}')">Mute</button>
      </span>
    `;

    list.appendChild(row);
  });
}

/* ADMIN ACTIONS */
function banUser(u){
  localStorage.setItem("banned_" + u, "true");
  alert(u + " banned");
}

function muteUser(u){
  localStorage.setItem("muted_" + u, "true");
  alert(u + " muted");
}

/* AUTO LOGIN */
window.onload = () => {
  const saved = localStorage.getItem("currentUser");
  if(saved) loadHub(saved);
};

/* LOGOUT */
function logout(){
  localStorage.removeItem("currentUser");
  location.reload();
}
</script>

</body>
</html>
