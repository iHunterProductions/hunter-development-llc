<!DOCTYPE html>
<html>
<head>
  <title>Hunter Development LLC</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle at center, #050505, #000);
      color: #00ffff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .menu {
      text-align: center;
      border: 2px solid #00ffff;
      padding: 30px;
      border-radius: 16px;
      box-shadow: 0 0 25px #00ffff;
      width: 320px;
    }

    h1 {
      margin-bottom: 20px;
      font-size: 22px;
      letter-spacing: 1px;
    }

    /* BUTTON BASE */
    button {
      display: block;
      width: 260px;
      margin: 12px auto;
      padding: 14px;
      border: none;
      background: #001f1f;
      color: #00ffff;
      font-weight: bold;
      border-radius: 10px;
      cursor: pointer;

      transition: all 0.25s ease;
      box-shadow: 0 0 5px #00ffff inset;
    }

    /* HOVER MAGIC */
    button:hover {
      transform: translateY(-5px) scale(1.05);
      background: #00ffff;
      color: #000;

      box-shadow:
        0 0 10px #00ffff,
        0 0 20px #00ffff,
        0 0 40px #00ffff;
    }

    /* CLICK EFFECT */
    button:active {
      transform: scale(0.97);
      box-shadow: 0 0 10px #00ffff inset;
    }

    /* SPECIAL TOP BUTTON */
    .terms {
      background: #002a2a;
    }

    .terms:hover {
      box-shadow:
        0 0 10px #ff00ff,
        0 0 20px #ff00ff,
        0 0 40px #ff00ff;
      background: #ff00ff;
      color: white;
    }
  </style>
</head>

<body>

<div class="menu">
  <h1>Hunter Development LLC</h1>

  <button class="terms" onclick="alert('Rules and Terms of Use: To be determined')">
    Terms of Use
  </button>

  <button onclick="location.href='chat.html'">
    Chat.Me 2
  </button>

  <button onclick="location.href='games/scramble/'">
    Scrambled Word Game
  </button>

  <button onclick="location.href='games/tetris/'">
    Tetris
  </button>
</div>

</body>
</html>
