<!DOCTYPE html>
<html>
<head>
  <title>iHunter Game Hub</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    h1 {
      margin-bottom: 20px;
    }

    button {
      width: 95%;
      padding: 12px;
      margin-top: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      transition: 0.25s ease;
    }

    .main-btn {
      background: #00c8c8;
      color: #001818;
    }

    .main-btn:hover {
      transform: scale(1.03);
      box-shadow: 0 0 20px #003366;
    }

    #tetrisOptions {
      max-height: 0;
      overflow: hidden;
      transition: max-height 0.4s ease;
    }

    #tetrisOptions.show {
      max-height: 300px;
    }

    .easy { background: #00cc66; }
    .normal { background: #e6c200; }
    .hard { background: #cc3333; color: white; }

    .easy:hover { box-shadow: 0 0 15px #00ff99; }
    .normal:hover { box-shadow: 0 0 15px #ffdd33; }
    .hard:hover { box-shadow: 0 0 15px #ff4444; }
  </style>
</head>

<body>

<div class="box">
  <h1>iHunter Game Hub</h1>

  <button class="main-btn" onclick="toggleTetris()">Tetris</button>

  <div id="tetrisOptions">
    <button class="easy" onclick="startGame(0.5)">Easy</button>
    <button class="normal" onclick="startGame(1)">Normal</button>
    <button class="hard" onclick="startGame(2)">Difficult</button>
  </div>

  <button class="main-btn" onclick="location.href='games/scramble/'">
    Scramble
  </button>
</div>

<script>
function toggleTetris(){
  document.getElementById("tetrisOptions").classList.toggle("show");
}

function startGame(speed){
  localStorage.setItem("tetrisSpeed", speed);
  location.href = "games/tetris/";
}
</script>

</body>
</html>
