<!DOCTYPE html>
<html>
<head>
  <title>Rules</title>

  <style>
    body {
      margin: 0;
      background: radial-gradient(circle, #05070a, #000);
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 25px;
      border-radius: 14px;
      box-shadow: 0 0 25px #00ffff;
      text-align: center;
    }

    h1 {
      margin-bottom: 15px;
    }

    p {
      color: #00ffff;
      font-size: 18px;
    }

    button {
      margin-top: 15px;
      width: 95%;
      padding: 10px;
      border: none;
      border-radius: 8px;
      cursor: pointer;
      font-weight: bold;
      background: #00c8c8;
      color: #001818;
    }

    button:hover {
      box-shadow: 0 0 15px #00ffff;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Rules</h1>

  <p>Rules to be determined</p>

  <button onclick="location.href='../'">Back to Hub</button>
</div>

</body>
</html>
