<!DOCTYPE html>
<html>
<head>
  <title>Tetris Fix Test</title>
  <style>
    body {
      margin: 0;
      background: black;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      color: white;
      font-family: Arial;
    }

    canvas {
      background: #111;
      border: 2px solid white;
    }
  </style>
</head>

<body>

<canvas id="game" width="300" height="600"></canvas>

<script>
console.log("Tetris script loaded OK");

const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

if (!ctx) {
  alert("Canvas failed to initialize!");
}

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

function drawTest() {
  ctx.fillStyle = "red";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  ctx.fillStyle = "white";
  ctx.font = "20px Arial";
  ctx.fillText("TETRIS LOADED", 60, 300);
}

function loop() {
  drawTest();
  requestAnimationFrame(loop);
}

loop();
</script>

</body>
</html>
