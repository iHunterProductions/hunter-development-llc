<!DOCTYPE html>
<html>
<head>
  <title>Tetris - Hunter Development LLC</title>
  <style>
    body {
      margin: 0;
      background: #111;
      color: white;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    canvas {
      background: #000;
      border: 2px solid #333;
    }

    .wrap {
      display: flex;
      gap: 20px;
      align-items: flex-start;
    }

    .panel {
      width: 150px;
    }

    h2 {
      margin: 5px 0;
    }
  </style>
</head>
<body>

<div class="wrap">
  <canvas id="game" width="300" height="600"></canvas>

  <div class="panel">
    <h2>Score</h2>
    <div id="score">0</div>

    <h2>Level</h2>
    <div id="level">1</div>

    <h2>Next</h2>
    <canvas id="next" width="120" height="120"></canvas>

    <br><br>
    <button onclick="location.reload()">Restart</button>
  </div>
</div>

<script>
const canvas = document.getElementById("game");
const ctx = canvas.getContext("2d");

const nextCanvas = document.getElementById("next");
const nctx = nextCanvas.getContext("2d");

const COLS = 10;
const ROWS = 20;
const SIZE = 30;

let board = Array.from({length: ROWS}, () => Array(COLS).fill(0));

const pieces = [
  [[1,1,1,1]], // I
  [[1,1],[1,1]], // O
  [[0,1,0],[1,1,1]], // T
  [[1,1,0],[0,1,1]], // S
  [[0,1,1],[1,1,0]], // Z
  [[1,0,0],[1,1,1]], // J
  [[0,0,1],[1,1,1]]  // L
];

let colors = ["cyan","yellow","purple","green","red","blue","orange"];

let score = 0;
let level = 1;
let dropSpeed = 500;

function randomPiece() {
  let id = Math.floor(Math.random()*pieces.length);
  return {
    shape: pieces[id],
    color: colors[id],
    x: 3,
    y: 0
  };
}

let current = randomPiece();
let next = randomPiece();

function drawBoard() {
  ctx.fillStyle = "#000";
  ctx.fillRect(0,0,canvas.width,canvas.height);

  for(let y=0;y<ROWS;y++){
    for(let x=0;x<COLS;x++){
      if(board[y][x]){
        ctx.fillStyle = board[y][x];
        ctx.fillRect(x*SIZE,y*SIZE,SIZE,SIZE);
      }
    }
  }
}

function drawPiece(p, context, offsetX=0, offsetY=0) {
  context.fillStyle = p.color;
  for(let y=0;y<p.shape.length;y++){
    for(let x=0;x<p.shape[y].length;x++){
      if(p.shape[y][x]){
        context.fillRect((p.x+x+offsetX)*SIZE,(p.y+y+offsetY)*SIZE,SIZE,SIZE);
      }
    }
  }
}

function collision(p){
  for(let y=0;y<p.shape.length;y++){
    for(let x=0;x<p.shape[y].length;x++){
      if(p.shape[y][x]){
        let nx = p.x + x;
        let ny = p.y + y;

        if(nx < 0 || nx >= COLS || ny >= ROWS) return true;
        if(ny >= 0 && board[ny][nx]) return true;
      }
    }
  }
  return false;
}

function merge(){
  current.shape.forEach((row,y)=>{
    row.forEach((val,x)=>{
      if(val){
        board[current.y+y][current.x+x] = current.color;
      }
    });
  });
}

function clearLines(){
  let lines = 0;

  for(let y=ROWS-1;y>=0;y--){
    if(board[y].every(cell=>cell)){
      board.splice(y,1);
      board.unshift(Array(COLS).fill(0));
      lines++;
      y++;
    }
  }

  if(lines){
    score += lines * 100;
    level = Math.floor(score/500)+1;
    dropSpeed = Math.max(100,500 - (level-1)*50);

    document.getElementById("score").innerText = score;
    document.getElementById("level").innerText = level;
  }
}

function rotate(piece){
  let newShape = piece.shape[0].map((_,i)=>
    piece.shape.map(row=>row[i]).reverse()
  );

  let old = piece.shape;
  piece.shape = newShape;

  if(collision(piece)){
    piece.shape = old;
  }
}

function drop(){
  current.y++;
  if(collision(current)){
    current.y--;
    merge();
    clearLines();
    current = next;
    next = randomPiece();

    if(collision(current)){
      alert("Game Over!");
      location.reload();
    }
  }
}

function drawNext(){
  nctx.fillStyle="#000";
  nctx.fillRect(0,0,120,120);
  drawPiece(next,nctx,0,0);
}

document.addEventListener("keydown",e=>{
  if(e.key==="ArrowLeft"){ current.x--; if(collision(current)) current.x++; }
  if(e.key==="ArrowRight"){ current.x++; if(collision(current)) current.x--; }
  if(e.key==="ArrowDown"){ drop(); }
  if(e.key==="ArrowUp"){ rotate(current); }
});

function loop(){
  drawBoard();
  drawPiece(current,ctx);
  drawNext();
}

setInterval(()=>{
  drop();
},dropSpeed);

setInterval(loop,50);
</script>

</body>
</html>
