<!DOCTYPE html>
<html>
<head>
  <title>Scrambled Word Game</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ffff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      text-align: center;
      border: 2px solid #00ffff;
      padding: 30px;
      border-radius: 10px;
      box-shadow: 0 0 20px #00ffff;
      width: 320px;
    }

    h1 {
      margin-bottom: 10px;
    }

    #scrambled {
      font-size: 28px;
      margin: 20px 0;
      letter-spacing: 2px;
    }

    input {
      padding: 10px;
      width: 80%;
      text-align: center;
      margin-top: 10px;
      border-radius: 6px;
      border: none;
      outline: none;
    }

    button {
      margin-top: 10px;
      padding: 10px;
      width: 100%;
      background: #00ffff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    #score {
      margin-top: 15px;
    }
  </style>
</head>

<body>

<div class="box">
  <h1>Scrambled Word Game</h1>

  <div id="scrambled">---</div>

  <input id="input" placeholder="Type the word">

  <button onclick="check()">Submit</button>

  <div id="score">Score: 0</div>

  <button onclick="nextWord()">Next Word</button>

  <button onclick="location.href='../../index.html'">
    Back Home
  </button>
</div>

<script>
let words = ["tetris","banana","rocket","planet","dragon","hunter","arcade","coding","pixel"];

let currentWord = "";
let score = 0;

function scramble(word){
  return word.split("")
    .sort(() => Math.random() - 0.5)
    .join("");
}

function nextWord(){
  currentWord = words[Math.floor(Math.random() * words.length)];
  document.getElementById("scrambled").innerText = scramble(currentWord);
  document.getElementById("input").value = "";
}

function check(){
  let guess = document.getElementById("input").value.toLowerCase();

  if(guess === currentWord){
    score++;
    document.getElementById("score").innerText = "Score: " + score;
    nextWord();
  } else {
    alert("Wrong! Try again.");
  }
}

nextWord();
</script>

</body>
</html>
