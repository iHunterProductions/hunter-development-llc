<!DOCTYPE html>
<html>
<head>
  <title>Chat.Me 2</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
    }

    #messages {
      height: 240px;
      overflow-y: auto;
      border: 1px solid #00ffff;
      margin: 10px 0;
      padding: 10px;
      text-align: left;
      background: rgba(0,255,255,0.05);
    }

    input {
      width: 90%;
      padding: 10px;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      background: #00c8c8;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
      margin-top: 8px;
    }

    .msg { margin: 5px 0; }
    .name { color: #ff00ff; font-weight: bold; }

    #status {
      color: red;
      margin-top: 5px;
    }
  </style>
</head>

<body>

<div class="box">
  <h2>Chat.Me 2</h2>

  <h3 id="welcome"></h3>
  <div id="status"></div>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>

  <button onclick="goHome()">Home</button>
</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
const username = localStorage.getItem("currentUser");

if(!username){
  alert("Login required");
  window.location.href = "index.html";
}

if(localStorage.getItem("banned_" + username) === "true"){
  alert("You are banned.");
  window.location.href = "index.html";
}

document.getElementById("welcome").innerText = `Welcome, ${username}!`;

if(localStorage.getItem("muted_" + username) === "true"){
  document.getElementById("status").innerText = "⚠ YOU ARE MUTED";
}

/* ABLY */
const ably = new Ably.Realtime({
  key: "c-wtfg.-Nr1zw:P37xNKXR2B4E-KOPhClqoUsFYS51FUiFroqUPVr3DZM"
});

const channel = ably.channels.get("chat-me-2");

channel.subscribe("message", msg => {
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<span class="name">${msg.data.name}:</span> ${msg.data.text}`;
  document.getElementById("messages").appendChild(div);
});

/* SEND */
function sendMsg(){
  if(localStorage.getItem("muted_" + username) === "true"){
    alert("You are muted.");
    return;
  }

  const input = document.getElementById("msg");
  const text = input.value;

  if(!text.trim()) return;

  channel.publish("message", {
    name: username,
    text: text
  });

  input.value = "";
}

/* HOME */
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
