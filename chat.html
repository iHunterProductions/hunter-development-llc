<!DOCTYPE html>
<html>
<head>
  <title>Chat.Me 2</title>

  <style>
    body {
      margin: 0;
      background: #000;
      font-family: Arial;
      color: #00ffff;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 20px;
      border-radius: 12px;
      text-align: center;
      box-shadow: 0 0 20px rgba(0,255,255,0.25);
    }

    #chatUI {
      display: none;
    }

    #messages {
      height: 260px;
      overflow-y: auto;
      border: 1px solid #00ffff;
      margin: 10px 0;
      padding: 10px;
      text-align: left;
      background: rgba(0,0,0,0.4);
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 8px 0;

      background: rgba(0, 0, 0, 0.6);
      color: #00ffff;

      border: 1px solid #00ffff;
      border-radius: 6px;

      text-align: center;
      outline: none;
    }

    input::placeholder {
      color: rgba(0,255,255,0.5);
    }

    button {
      width: 100%;
      padding: 12px;
      margin-top: 8px;

      background: linear-gradient(145deg, #00e6e6, #009999);
      color: #000;

      border: none;
      border-radius: 8px;

      font-weight: bold;
      cursor: pointer;

      transition: 0.2s;
    }

    button:hover {
      transform: scale(1.03);
      background: #00ffff;
      box-shadow: 0 0 15px #00ffff;
    }
  </style>
</head>

<body>

<!-- 🔐 PASSWORD GATE -->
<div id="gate" class="box">
  <h2>Chat.Me 2</h2>

  <input id="pass" type="password" placeholder="Enter Password">

  <button onclick="enter()">Enter</button>
</div>

<!-- 💬 CHAT -->
<div id="chatUI" class="box">
  <h3 id="welcome"></h3>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message...">
  <button onclick="send()">Send</button>
</div>

<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>

const ABLY_KEY = "c-wtfg.-Nr1zw:P37xNKXR2B4E-KOPhClqoUsFYS51FUiFroqUPVr3DZM";
const CHANNEL = "ChatMeDos";

const username = localStorage.getItem("currentUser");

if(!username){
  location.href = "index.html";
}

let ably;
let channel;

/* 🔐 PASSWORD */
function enter(){
  if(pass.value !== "0708"){
    return alert("Wrong password");
  }

  gate.style.display = "none";
  chatUI.style.display = "block";

  start();
}

/* 🚀 START ABLY */
function start(){
  welcome.innerText = "Welcome, " + username;

  ably = new Ably.Realtime({ key: ABLY_KEY });
  channel = ably.channels.get(CHANNEL);

  /* RECEIVE MESSAGES */
  channel.subscribe("message", msg => {
    addMessage(msg.data.name, msg.data.text);
  });

  loadHistory();

  msg.addEventListener("keydown", e => {
    if(e.key === "Enter") send();
  });
}

/* 💬 SEND MESSAGE */
function send(){
  if(!msg.value.trim()) return;

  channel.publish("message", {
    name: username,
    text: msg.value
  });

  msg.value = "";
}

/* 📥 DISPLAY MESSAGE */
function addMessage(name, text){
  const div = document.createElement("div");
  div.innerHTML = `<b>${name}:</b> ${text}`;

  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;

  saveToHistory(name, text);
}

/* 💾 LOCAL BACKUP HISTORY */
function saveToHistory(name, text){
  let history = JSON.parse(localStorage.getItem("chat_history") || "[]");

  history.push({ name, text });

  localStorage.setItem("chat_history", JSON.stringify(history.slice(-50)));
}

/* 📥 LOAD HISTORY */
function loadHistory(){
  let history = JSON.parse(localStorage.getItem("chat_history") || "[]");

  history.forEach(m => {
    const div = document.createElement("div");
    div.innerHTML = `<b>${m.name}:</b> ${m.text}`;
    messages.appendChild(div);
  });

  messages.scrollTop = messages.scrollHeight;
}

</script>

</body>
</html>
