<!DOCTYPE html>
<html>
<head>
  <title>Chat.Me 2</title>

  <style>
    body {
      margin: 0;
      background: #000;
      color: #00ffff;
      font-family: Arial;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .box {
      width: 360px;
      border: 2px solid #00ffff;
      padding: 20px;
      border-radius: 12px;
      box-shadow: 0 0 20px #00ffff;
      text-align: center;
    }

    input {
      width: 90%;
      padding: 10px;
      margin: 5px 0;
      border: none;
      border-radius: 6px;
      text-align: center;
    }

    button {
      width: 95%;
      padding: 10px;
      margin-top: 10px;
      background: #00ffff;
      border: none;
      font-weight: bold;
      cursor: pointer;
      border-radius: 6px;
    }

    button:hover {
      background: #00dddd;
    }

    #messages {
      height: 250px;
      overflow-y: auto;
      border: 1px solid #00ffff;
      margin: 10px 0;
      padding: 10px;
      text-align: left;
      background: rgba(0,255,255,0.05);
    }

    .msg {
      margin: 6px 0;
    }

    .name {
      color: #ff00ff;
      font-weight: bold;
    }
  </style>
</head>

<body>

<!-- LOGIN -->
<div id="login" class="box">
  <h2>Chat.Me 2</h2>
  <p>Enter Password</p>
  <input id="pass" type="password" placeholder="Password">
  <button onclick="checkPass()">Enter</button>
</div>

<!-- CHAT -->
<div id="chat" class="box" style="display:none;">
  <h2>Live Chat</h2>

  <div id="messages"></div>

  <input id="msg" placeholder="Type message">
  <button onclick="sendMsg()">Send</button>

  <button onclick="goHome()">Home</button>
</div>

<!-- ABLY -->
<script src="https://cdn.ably.io/lib/ably.min-1.js"></script>

<script>
let channel;
let username;

/* PASSWORD */
function checkPass(){
  if(document.getElementById("pass").value === "0708"){
    startChat();
  } else {
    alert("Wrong password");
  }
}

/* START CHAT */
function startChat(){
  document.getElementById("login").style.display = "none";
  document.getElementById("chat").style.display = "block";

  username = prompt("Enter username:");
  if(!username) username = "Guest";

  const ably = new Ably.Realtime({
    key: "c-wtfg.-Nr1zw:P37xNKXR2B4E-KOPhClqoUsFYS51FUiFroqUPVr3DZM"
  });

  channel = ably.channels.get("chat-me-2");

  channel.subscribe("message", msg => {
    addMessage(msg.data.name, msg.data.text);
  });
}

/* ADD MESSAGE */
function addMessage(name, text){
  const div = document.createElement("div");
  div.className = "msg";
  div.innerHTML = `<span class="name">${name}:</span> ${text}`;

  const messages = document.getElementById("messages");
  messages.appendChild(div);
  messages.scrollTop = messages.scrollHeight;
}

/* SEND MESSAGE */
function sendMsg(){
  const input = document.getElementById("msg");
  const text = input.value;

  if(!text.trim()) return;

  channel.publish("message", {
    name: username,
    text: text
  });

  input.value = "";
}

/* ENTER KEY SEND */
document.addEventListener("keydown", function(e){
  if(e.key === "Enter"){
    sendMsg();
  }
});

/* HOME BUTTON */
function goHome(){
  window.location.href = "index.html";
}
</script>

</body>
</html>
